syntax = "proto3";

package metrics;

option go_package = "github.com/ricleal/GoLang/real_time_metrics_agg/pb";

// A single metric data point from a client.
message Metric {
  string name       = 1;
  double value      = 2;
  int64  timestamp  = 3; // unix nanos
  string client_id  = 4;
  map<string, string> labels = 5;
}

// An alert triggered when a metric crosses a threshold.
message Alert {
  string id          = 1;
  string metric_name = 2;
  double threshold   = 3;
  double current_value = 4;
  string severity    = 5; // "WARN" or "CRITICAL"
  int64  triggered_at = 6;
  string message     = 7;
}

// Aggregated metric snapshot sent from server to client.
message AggregatedMetric {
  string metric_name = 1;
  double sum         = 2;
  double avg         = 3;
  double min         = 4;
  double max         = 5;
  uint64 count       = 6;
  double p50         = 7;
  double p95         = 8;
  double p99         = 9;
  int64  window_start = 10;
  int64  window_end   = 11;
}

// Request to set an alert threshold.
message SetThresholdRequest {
  string metric_name = 1;
  double warn        = 2;
  double critical    = 3;
}

message SetThresholdResponse {
  bool ok = 1;
}

message HealthCheckRequest {
  string service = 1;
}

message HealthCheckResponse {
  string status  = 1;
  bool   leader  = 2;
}

message JoinClusterRequest {
  string node_id      = 1;
  string raft_address = 2;
}

message JoinClusterResponse {
  bool ok = 1;
}

// The gRPC service.
service MetricsAggregator {
  // Bidirectional streaming: client pushes metrics, server streams back alerts + aggregates.
  rpc StreamMetrics(stream Metric) returns (stream AggregatedMetric);

  // Set alert thresholds dynamically.
  rpc SetThreshold(SetThresholdRequest) returns (SetThresholdResponse);

  // Health check.
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  // Join a node to the Raft cluster.
  rpc JoinCluster(JoinClusterRequest) returns (JoinClusterResponse);
}
